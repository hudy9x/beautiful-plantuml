<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <!-- Base clips for light circles to create drop shadow crescents -->
    <clipPath id="y-base"><circle cx="128" cy="87" r="80" /></clipPath>
    <clipPath id="t-base"><circle cx="81" cy="168" r="80" /></clipPath>
    <clipPath id="c-base"><circle cx="175" cy="168" r="80" /></clipPath>
    
    <!-- Redraw clip for the cyclic overlap -->
    <clipPath id="right-half"><rect x="128" y="0" width="128" height="256" /></clipPath>
    
    <!-- Center white piece clips -->
    <clipPath id="w1"><circle cx="128" cy="87" r="80" /></clipPath>
    <clipPath id="w2"><circle cx="81" cy="168" r="80" /></clipPath>
  </defs>

  <g id="yellow-group">
    <circle cx="128" cy="87" r="80" fill="#FAD154" />
    <circle cx="128" cy="79" r="80" fill="#FFEA6B" clip-path="url(#y-base)" />
    <!-- Yellow dashes -->
    <rect x="116" y="63" width="24" height="6" rx="3" fill="#FAD154" />
    <rect x="108" y="77" width="40" height="6" rx="3" fill="#FAD154" />
  </g>

  <g id="teal-group">
    <circle cx="81" cy="168" r="80" fill="#1AC89F" />
    <circle cx="87" cy="162" r="80" fill="#3EE0B6" clip-path="url(#t-base)" />
    <!-- Teal dashes -->
    <rect x="69" y="153" width="24" height="6" rx="3" fill="#1AC89F" />
    <rect x="61" y="167" width="40" height="6" rx="3" fill="#1AC89F" />
  </g>

  <g id="coral-group">
    <circle cx="175" cy="168" r="80" fill="#FA634D" />
    <circle cx="169" cy="162" r="80" fill="#FF826E" clip-path="url(#c-base)" />
    <!-- Coral dashes -->
    <rect x="163" y="153" width="24" height="6" rx="3" fill="#FA634D" />
    <rect x="155" y="167" width="40" height="6" rx="3" fill="#FA634D" />
  </g>

  <!-- Cyclic overlap: Yellow covers Coral on the right half -->
  <use href="#yellow-group" clip-path="url(#right-half)" />

  <!-- Center white piece matches image -->
  <g clip-path="url(#w1)">
    <g clip-path="url(#w2)">
      <circle cx="175" cy="168" r="80" fill="#FAFAFA" />
    </g>
  </g>
</svg>